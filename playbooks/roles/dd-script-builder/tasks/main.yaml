---
# === Python 3.14 ===
- name: Check if software-properties-common is installed
  command: dpkg-query -W -f='${Status}' software-properties-common
  register: spc_status
  failed_when: false
  changed_when: false

- name: Install software-properties-common
  apt:
    name: software-properties-common
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: spc_status.stdout != "install ok installed"

- name: Add deadsnakes PPA for Python 3.14
  apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present

- name: Install Python 3.14
  apt:
    name:
      - python3.14
      - python3.14-venv
      - python3.14-dev
      - zip
    state: present
    update_cache: yes
    cache_valid_time: 3600

# === app ===
- name: Clone dd-script-builder from Github
  git:
    repo: "{{ dd_script_builder_repo }}"
    update: yes
    dest: "{{ dd_script_builder_dir }}"

- name: Create virtualenv and install dependencies
  pip:
    requirements: "{{ dd_script_builder_dir }}/requirements.txt"
    virtualenv: "{{ dd_script_builder_venv_dir }}"
    virtualenv_command: python3.14 -m venv

- name: Install systemd service
  template:
    src: dd-script-builder.service.j2
    dest: /etc/systemd/system/{{ dd_script_builder_service_name }}.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start service
  systemd:
    name: "{{ dd_script_builder_service_name }}"
    enabled: true
    state: started
