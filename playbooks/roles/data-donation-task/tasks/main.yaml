---
- name: Install git
  apt:
    name: git
    state: present
    update_cache: yes
    cache_valid_time: 3600

# === Node.js v24.14.0 ===
- name: Download Node.js v24.14.0 tarball
  get_url:
    url: https://nodejs.org/dist/v24.14.0/node-v24.14.0-linux-x64.tar.xz
    dest: /tmp/node-v24.14.0-linux-x64.tar.xz

- name: Extract Node.js v24.14.0 into /usr/local
  unarchive:
    src: /tmp/node-v24.14.0-linux-x64.tar.xz
    dest: /usr/local
    remote_src: yes
    extra_opts: [--strip-components=1]
    creates: /usr/local/bin/node

# === pnpm ===
- name: Install pnpm via npm
  npm:
    name: pnpm
    global: yes
    state: present

# === poetry ===
- name: Install poetry system-wide
  shell: curl -sSL https://install.python-poetry.org | python3 -
  args:
    creates: /usr/local/bin/poetry
  environment:
    POETRY_HOME: /usr/local

- name: Install sync systemd service
  template:
    src: data-donation-task-sync.service.j2
    dest: /etc/systemd/system/{{ data_donation_task_sync_service_name }}.service
    owner: root
    group: root
    mode: "0644"

- name: Install sync systemd timer
  template:
    src: data-donation-task-sync.timer.j2
    dest: /etc/systemd/system/{{ data_donation_task_sync_service_name }}.timer
    owner: root
    group: root
    mode: "0644"

- name: Enable and start daily sync timer
  systemd:
    name: "{{ data_donation_task_sync_service_name }}.timer"
    enabled: true
    state: started
    daemon_reload: true

- name: Run sync service immediately for initial clone and dependency install
  systemd:
    name: "{{ data_donation_task_sync_service_name }}.service"
    state: started
